<!DOCTYPE html>
<html lang="ja">
<head>

<title>MEXT 2020 Japanese Exam</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:#f1f5f9;padding:16px;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:20px}
.hdr{padding-bottom:12px;border-bottom:1px solid #e2e8f0;margin-bottom:14px}
.hdr h1{font-size:16px;font-weight:600;color:#0f172a}

.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.stab{font-size:12px;padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;color:#64748b}

.qb.ok{border-color:#16a34a;background:#f0fdf4}
.qb.ng{border-color:#dc2626;background:#fef2f2}
.qb.sm{border-color:#d97706;background:#fffbeb}
.qt{font-size:14px;line-height:1.7;color:#1e293b;margin-bottom:8px;white-space:pre-wrap}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.opt:hover{background:#eff6ff;border-color:#93c5fd}
.opt.sel{background:#dbeafe;border-color:#2563eb;color:#1e40af;font-weight:500}

.opt.bad{background:#fee2e2!important;border-color:#dc2626!important;color:#7f1d1d!important}
.opt:disabled{cursor:default}
.fb{font-size:12px;margin-top:6px;padding:5px 8px;background:rgba(0,0,0,.04);border-radius:4px;color:#555}
.wcols{display:grid;grid-template-columns:130px 1fr 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed #f1f5f9}
.wlabel{font-size:14px;color:#1e293b;font-weight:500}
.winput{font-size:14px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;color:#1e293b;width:100%;font-family:inherit}
.winput:focus{outline:none;border-color:#7c3aed}
.wans{font-size:13px;padding:5px 10px;border-radius:6px;background:#f0fdf4;border:1px solid #16a34a;color:#14532d;font-weight:500;visibility:hidden}
.wans.show{visibility:visible}
.whead{font-size:13px;font-weight:600;color:#334155;margin:12px 0 6px;border-bottom:1px solid #f1f5f9;padding-bottom:4px}
.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:12px;border-top:1px solid #f1f5f9;margin-top:4px}
.btn{font-size:13px;padding:7px 16px;border:1px solid #cbd5e1;border-radius:7px;background:#fff;cursor:pointer;color:#334155;font-weight:500}
.btn:hover{background:#f8fafc}
.btn.primary{background:#7c3aed;color:#fff;border-color:#7c3aed}
.btn.primary:hover{background:#6d28d9}
.prog{font-size:12px;color:#94a3b8;margin-left:auto}
.scorebox{border:1px solid #e2e8f0;border-radius:10px;padding:20px;margin-bottom:14px}
.stotal{text-align:center;margin-bottom:16px}
.sbig{font-size:52px;font-weight:700;color:#0f172a;line-height:1}
.grade{display:inline-block;margin-top:8px;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:600}
.gh{background:#dcfce7;color:#14532d}.gm{background:#fef9c3;color:#713f12}.gl{background:#fee2e2;color:#7f1d1d}
.lrow{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f1f5f9}
.lrow:last-child{border:none;margin:0;padding:0}
.lhdr{display:flex;justify-content:space-between;margin-bottom:8px}
.ltitle{font-size:14px;font-weight:600;color:#0f172a}
.lval{font-size:16px;font-weight:700;color:#0f172a}
.ssgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.ss{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px;text-align:center}
.sslabel{font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.ssval{font-size:15px;font-weight:700;color:#1e293b}
.ssnote{font-size:10px;color:#94a3b8}
</style>
</head>

{q:"2. 田中さん:「このあと、いっしょに しょくじに 行きませんか。」\n山田さん:「すみません。＿＿、きょうは むすこの たんじょう日なんです。」\n田中さん:「ああ、そうなんですか。じゃあ、また こんど。」",o:["A ざんねんですが","B つまらないですが","C おきのどくですが","D おねがいですが"],a:"A"},
{q:"3. ユカさん:「きれいな うみですね。ここで いっしょに しゃしんを とりませんか。」\nエミさん:「＿＿。」\nユカさん:「じゃあ、ミキさんに とってもらいましょう。」",o:["A わたしが とってあげます","B べつの ばしょなら いいですよ","C ここは ちょっと......","D もちろん、いいですよ"],a:"D"},
{q:"4. 田中さん:「あしたは 何時に 会いましょうか。」\n山田さん:「そうですね。えいがが 14時40分だから、14時20分に えいがかんの前は どうですか。」\n田中さん:「うん、もう ちょっと ＿＿。飲み物を 買いたいので。」\n山田さん:「あ、そうですね。じゃあ、14時10分に しますか。」",o:["A 早い方が いいですか","B 早い方が よくないですか","C 遅い方が いいじゃないですか","D 遅い方が よくないですか"],a:"C"},
{q:"5. デパートの店員:「いらっしゃいませ。」\n田中さん:「すみません、旅行かばんは どの かいですか。」\nデパートの店員:「＿＿でしたら、4かいでございます。少し 分かりにくい ばしょなので、ごあんないします。」",o:["A ここ","B そこ","C これ","D それ"],a:"D"},

{id:"AV",name:"V 読解",type:"m",instr:"次の文を読んで、あとの問いに答えなさい。A~Dの中から一つ選びなさい。",qs:[
{q:"問い１（弁当）:「弁当」を食べたことがありますか。「弁当」は 昔の 中国語から 来た 言葉です。日本では、平安時代（約1100年前）から 弁当が あったそうです。現在でも 食べられる「幕の内弁当」は 江戸時代（約400年前）に 歌舞伎の 休み時間に 食べていた 弁当です。このころには、すでに 弁当の 作り方についての 本が たくさん あったそうです。\n\n文の内容に合っているものはどれですか。",o:["A 弁当という言葉は、日本で作られた言葉です","B 幕の内弁当は特別な弁当なので、現在は食べられません","C 幕の内弁当は、平安時代にできました","D 江戸時代には、弁当の作り方を説明した本がありました"],a:"D"},
{q:"問い２（日傘）:昨日、私は 日傘を 買いました。日傘というのは、晴れの 日に さす 傘の ことです。日本の 夏はとても 暑いので、外を 歩いていると、頭が 痛くなったり、気分が 悪くなったりします。だから、日本では、夏、雨が 降っていなくても 傘をさすのです。私が 買った 日傘は、白くて、きれいな 花の 絵が ついています。暑い 日は 出かけるのが 大変ですが、きれいな 花の デザインを 見ると、楽しい 気分に なります。私の 国では、晴れの 日に 傘をさしませんが、今度、私の 家族や 友だちに 日傘の よさを 教えてあげようと 思います。\n\n文の内容に合っているものはどれですか。",o:["A 私は 暑い 日に 外を 歩いたので、病気に なりました","B 私は 日傘に 白くて きれいな 花を つけました","C 日傘は、雨が 降っていない 日に さす 傘のことです","D 私の 家族や 友だちは 日傘を さしたことがあります"],a:"C"},
{q:"問い３（食事）:昔から、日本の 食事は 「一汁三菜」が いいと 言われます。「汁」はスープというい意味で、「菜」は 料理という 意味です。ご飯の 他に、スープと 3つの 料理が あれば、いい 食事に なるということです。日本では、季節の 美しさを 料理で 見せることが 大切だと 言われています。だから、季節が 違うと、料理に 使う 野菜や 魚も 違います。最近は、魚や 野菜や 果物などを 外国から 輸入することが 増えています。また、自分で 料理を 作らないで、店で 買ったり 食べたりすることも 増えていて、少しずつ 食事の 文化が 変わってきています。\n\n日本の 食事について、合っているものはどれですか。",o:["A スープと 3つの 料理が なければなりません","B 最近、日本の 魚や 野菜などを 使っていません","C 料理を 見たとき、季節が わかるように 作るのが いいです","D 自分で 料理を 作って 食べる 文化に 変わってきています"],a:"C"},
{q:"問い４（めがねの町）:ある 町で、人々は 野菜や 米を 育てて 生活していました。しかし、冬は たくさん 雪が 降るので、仕事が できません。お金がなくて、みんな 困っていました。そんなとき、ある 人が「めがねを 作る 仕事なら、家の 中で できる」と 考えたのです。その 人は、大阪から めがねの 先生を 連れてきました。町の 人たちは、先生から めがねの 作り方を 習って、冬の 間、めがねを 作る 仕事を するように なりました。今、その 町には 600以上の めがねの 工場があり、日本の めがねの ほとんどが そこで 作られています。\n\n文の内容に合っているものはどれですか。",o:["A その 町の 人たちは、みんな めがねをかけています","B 「めがねの 先生」は、毎年 冬に 大阪から 来て 仕事を します","C 「めがねの 先生」は、その 町に めがねの 工場を 作りました","D 日本の いろいろな 場所で、その 町の めがねを 買うことが できます"],a:"D"},
{q:"問い５（食品ロス）:日本には、食べられるのに 捨てられてしまう 食べ物が 1年で 646万トンも あります。そのなかには、レストランで 食べきれなかったものや、食べ物の 会社が たくさん 作りすぎた ものも あります。このような 捨てられてしまう 食べ物は だんだん 増えているそうです。そこで、このような 食べ物を 減らすために、たくさん 作りすぎた 食べ物を、食べ物が 足りない 国や 人に あげたり、野菜を 作るときに 土に 混ぜて 使ったりしています。\n\n文の内容に合っているものはどれですか。",o:["A 日本では 食べられるのに 捨てられる 食べ物が 少ないです","B たくさん 作りすぎた 食べ物は、食べ物が 足りない 人に あげることがあります","C レストランでは あまった 食べ物を 捨てては いけないという ルールがあります","D 残った 食べ物は 野菜を 作るときに 土に 混ぜて、全部 使います"],a:"B"},

var cl=0,cs=0,ans={},done=false,savedScore="";

function lvl(){return D[cl];}
function sec(){return lvl().ss[cs];}

function renderLtabs(){var el=document.getElementById("ltabs");el.innerHTML="";D.forEach(function(lv,i){var b=document.createElement("button");b.className="ltab"+(i===cl?" on":"");b.textContent=lv.name;b.onclick=(function(x){return function(){cl=x;cs=0;render();};})(i);el.appendChild(b);});}
function renderStabs(){var el=document.getElementById("stabs");el.innerHTML="";lvl().ss.forEach(function(s,i){var b=document.createElement("button");b.className="stab"+(i===cs?" on":"");b.textContent=s.name;b.onclick=(function(x){return function(){cs=x;render();};})(i);el.appendChild(b);});}

function render(){
  renderLtabs();renderStabs();
  var s=sec();
  var h='<div class="sec-title">'+s.name+'</div><p class="instr">'+s.instr+'</p>';
  if(s.type==="m"){
    s.qs.forEach(function(q,qi){
      var key=s.id+"_"+qi,ua=ans[key]||"";
      var ok=done&&ua&&ua[0]===q.a,ng=done&&(!ua||ua[0]!==q.a);
      h+='<div class="qb'+(done?(ok?" ok":" ng"):"")+'"><div class="qt">'+q.q+'</div><div class="opts">';
      q.o.forEach(function(op){var sel=ua===op;var cls="opt"+(sel?" sel":"");if(done){if(op[0]===q.a)cls+=" good";else if(sel)cls+=" bad";}h+='<button class="'+cls+'" '+(done?"disabled":"")+' onclick="pick(\''+key+'\',\''+op.replace(/'/g,"&#39;")+'\')">'+op+'</button>';});
      h+='</div>';
      if(done){h+='<div class="fb">正解: <strong>'+q.a+'</strong>'+(ua?"":" — 未回答")+'</div>';}
      h+='</div>';
    });
  }
  if(s.type==="w"){
    if(done){h+='<p style="font-size:13px;background:#fef9c3;border:1px solid #fcd34d;border-radius:6px;padding:8px 10px;margin-bottom:10px;color:#92400e">自己採点: 正解と比べて自分で採点してください。</p>';}
    h+='<div class="whead">■ 選択問題</div>';
    h+='<div class="wcols" style="font-size:11px;color:#94a3b8;font-weight:700"><span>問題</span><span>あなたの答え</span><span>正解</span></div>';
    s.k.forEach(function(k,ki){
      var key=s.id+"_k"+ki;var ua=ans[key]||"";
      h+='<div class="wcols"><span class="wlabel">'+k.n+'. '+k.q+'</span>'+
        '<input class="winput" type="text" value="'+ua.replace(/"/g,"&quot;")+'" '+(done?"disabled":"")+' placeholder="A/B/C/D" oninput="sw(\''+key+'\',this.value)">'+
        '<span class="wans'+(done?" show":"")+'">'+k.a+'</span></div>';
    });
  }
  document.getElementById("main").innerHTML=h;
  document.getElementById("pb").style.display=(cs===0&&cl===0)?"none":"";
  document.getElementById("nb").style.display=(cs===lvl().ss.length-1&&cl===D.length-1)?"none":"";
  var isLast=cl===D.length-1&&cs===lvl().ss.length-1;
  document.getElementById("sb").style.display=(!done&&isLast)?"":"none";
  var t=0,d=0;D.forEach(function(lv){lv.ss.forEach(function(s){if(s.type==="m")s.qs.forEach(function(_,qi){t++;if(ans[s.id+"_"+qi])d++;});});});
  document.getElementById("pg").textContent=d+"/"+t+" answered";
}

function pick(k,op){if(done)return;ans[k]=op;render();}
function sw(key,v){ans[key]=v;}

function move(d){
  var ss=lvl().ss,ns=cs+d;
  if(ns<0){if(cl>0){cl--;cs=D[cl].ss.length-1;}}
  else if(ns>=ss.length){if(cl<D.length-1){cl++;cs=0;}}
  else{cs=ns;}
  render();
}

function submit(){
  done=true;
  var gc=0,gt=0;
  var lvRows="";
  D.forEach(function(lv){
    var lc=0,lt=0,srows="";
    lv.ss.forEach(function(s){
      if(s.type==="m"){var sc=0,st=s.qs.length;s.qs.forEach(function(q,qi){var ua=ans[s.id+"_"+qi]||"";if(ua&&ua[0]===q.a)sc++;});srows+='<div class="ss"><div class="sslabel">'+s.name.split(" ")[0]+'</div><div class="ssval">'+sc+"/"+st+'</div><div class="ssnote">'+Math.round(sc/st*100)+'%</div></div>';lc+=sc;lt+=st;}
      else{srows+='<div class="ss"><div class="sslabel">'+s.name.split(" ")[0]+'</div><div class="ssval" style="font-size:11px;color:#92400e">Self</div><div class="ssnote">mark</div></div>';}
    });
    gc+=lc;gt+=lt;
    lvRows+='<div class="lrow"><div class="lhdr"><span class="ltitle">'+lv.name+'</span><span class="lval">'+lc+"/"+lt+' ('+Math.round(lc/lt*100)+'%)</span></div><div class="ssgrid">'+srows+'</div></div>';
  });
  var pct=Math.round(gc/gt*100),gc2=pct>=80?"gh":pct>=65?"gm":"gl";
  var gt2=pct>=80?"Excellent":pct>=65?"Good":"Keep practising";
  if(pct>=80)gt2="Excellent — strong result";else if(pct>=65)gt2="Good";else gt2="Keep practising";
  savedScore='<div class="scorebox"><div class="stotal"><div class="sbig">'+gc+"/"+gt+'</div><div style="font-size:14px;color:#64748b;margin-top:6px">MCQ total ('+pct+'%)</div><div><span class="grade '+gc2+'">'+gt2+'</span></div></div>'+lvRows+'</div>';
  showScore();
}

function showScore(){
  document.getElementById("main").innerHTML=savedScore;
  document.getElementById("ltabs").innerHTML="";
  document.getElementById("stabs").innerHTML="";
  document.getElementById("nav").innerHTML='<button class="btn" onclick="review()">Review answers</button><button class="btn" onclick="retake()" style="margin-left:4px">Retake</button>';
}

function review(){
  cl=0;cs=0;
  document.getElementById("nav").innerHTML='<button class="btn" id="pb" onclick="move(-1)">← Prev</button><button class="btn" id="nb" onclick="move(1)">Next →</button><span class="prog" id="pg"></span><button class="btn primary" onclick="showScore()" style="margin-left:auto">Back to score</button>';
  render();
}

function retake(){
  ans={};done=false;savedScore="";cl=0;cs=0;
  document.getElementById("nav").innerHTML='<button class="btn" id="pb" onclick="move(-1)">← Prev</button><button class="btn" id="nb" onclick="move(1)">Next →</button><button class="btn primary" id="sb" style="display:none" onclick="submit()">Submit exam</button><span class="prog" id="pg"></span>';
  render();
}

render();
</script>
</body>
</html>
